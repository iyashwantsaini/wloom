name: wolwoloom
description: >
  Editorial, typewriter-flavored Flutter design system. Mono type, hairline
  borders, ink-on-paper palette with a periwinkle accent. 100+ Material 3 widgets.
version: 0.3.6
homepage: https://github.com/iyashwantsaini/wloom
repository: https://github.com/iyashwantsaini/wloom
issue_tracker: https://github.com/iyashwantsaini/wloom/issues
topics:
  - design-system
  - ui
  - widgets
  - theme
  - material3

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
